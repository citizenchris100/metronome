<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- full-bleed background so it works as an iOS apple-touch-icon and an Android maskable icon -->
  <rect width="512" height="512" fill="#15171c"/>
  <rect width="512" height="512" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#21252e"/>
      <stop offset="100%" stop-color="#121317"/>
    </radialGradient>
  </defs>

  <!-- classic wind-up metronome body (truncated triangle) -->
  <path d="M 256 92 L 338 404 Q 340 420 324 420 L 188 420 Q 172 420 174 404 Z"
        fill="#ff5a3c"/>
  <!-- subtle right-side shading -->
  <path d="M 256 92 L 338 404 Q 340 420 324 420 L 256 420 Z"
        fill="#000000" opacity="0.12"/>

  <!-- scale window -->
  <rect x="240" y="168" width="32" height="206" rx="8" fill="#15171c" opacity="0.55"/>

  <!-- pendulum rod + sliding weight, pivoting near the apex and tilted like mid-swing -->
  <g transform="rotate(13 256 150)">
    <rect x="250" y="150" width="12" height="232" rx="6" fill="#15171c"/>
    <rect x="236" y="236" width="40" height="26" rx="6" fill="#15171c"/>
  </g>

  <!-- pivot + accent beat dot -->
  <circle cx="256" cy="150" r="11" fill="#ffd2c6"/>
</svg>
